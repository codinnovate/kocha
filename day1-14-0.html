<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple To-Do List</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #taskList { list-style-type: none; padding: 0; }
        li { padding: 8px; background-color: #f9f9f9; margin-bottom: 5px; }
        li.completed { text-decoration: line-through; }
    </style>
</head>
<body>

    <h1>To-Do List</h1>
    <input type="text" id="newTask" placeholder="Add a new task">
    <button onclick="addTask()">Add Task</button>

    <ul id="taskList"></ul>

    <script>
        // This function adds a new task to the list
        function addTask() {
            const taskInput = document.getElementById('newTask');
            const taskText = taskInput.value.trim();
            if (taskText === '') return;

            const taskList = document.getElementById('taskList');
            const newTask = document.createElement('li');
            newTask.textContent = taskText;
            newTask.onclick = function() {
                this.classList.toggle('completed'); // Toggles the completed state of a task
            };
            taskList.appendChild(newTask);
            taskInput.value = '';
        }
    </script>

</body>
</html>
