<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive To-Do List</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #taskInput { width: 200px; }
        ul { list-style-type: none; padding: 0; }
        li { padding: 8px; background: #f4f4f4; margin-bottom: 5px; cursor: pointer; }
        li.completed { text-decoration: line-through; background: #d4d4d4; }
    </style>
</head>
<body>

    <h2>To-Do List</h2>
    <!-- Input field for adding new tasks -->
    <input type="text" id="taskInput" placeholder="Add a new task">
    <button onclick="addTask()">Add</button>

    <ul id="taskList">
        <!-- List of tasks will be dynamically added here -->
    </ul>

    <script>
        // Function to add a new task to the list
        function addTask() {
            const taskInput = document.getElementById('taskInput');
            const taskText = taskInput.value.trim();

            if (taskText !== '') {
                const li = document.createElement('li');
                li.textContent = taskText;
                li.onclick = function () {
                    this.classList.toggle('completed'); // Toggle completion state
                };
                document.getElementById('taskList').appendChild(li);
                taskInput.value = ''; // Clear the input field
            }
        }
    </script>

</body>
</html>
