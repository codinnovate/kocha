<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple To-Do List</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #taskList { list-style-type: none; padding: 0; }
        #taskList li { padding: 8px; background: #f9f9f9; margin-bottom: 5px; }
        #taskList li.completed { text-decoration: line-through; }
    </style>
</head>
<body>
    <h1>To-Do List</h1>
    <input type="text" id="taskInput" placeholder="Add a new task" />
    <button onclick="addTask()">Add Task</button>
    <ul id="taskList"></ul>

    <script>
        // Function to add a new task to the list
        function addTask() {
            const taskInput = document.getElementById('taskInput');
            const taskText = taskInput.value.trim();
            if (taskText === '') return; // Ignore empty inputs

            // Create a new list item for the task
            const li = document.createElement('li');
            li.textContent = taskText;
            li.onclick = function() {
                // Toggle the 'completed' class when the task is clicked
                li.classList.toggle('completed');
            }
            document.getElementById('taskList').appendChild(li);
            taskInput.value = ''; // Clear the input field
        }
    </script>
</body>
</html>
