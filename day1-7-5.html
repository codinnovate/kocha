<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple To-Do List</title>
    <style>
        body { font-family: Arial, sans-serif; }
        ul { list-style-type: none; padding: 0; }
        li { background: #f4f4f4; margin: 5px 0; padding: 10px; border-radius: 5px; }
        input, button { padding: 10px; }
    </style>
</head>
<body>

    <h1>To-Do List</h1>
    <input type="text" id="taskInput" placeholder="Add a new task...">
    <button onclick="addTask()">Add Task</button>

    <ul id="taskList"></ul>

    <script>
        // This function adds a new task to the to-do list
        function addTask() {
            const taskInput = document.getElementById('taskInput');
            const taskText = taskInput.value.trim();
            
            if (taskText === '') return; // Exit if input is empty

            const taskList = document.getElementById('taskList');
            const newTask = document.createElement('li');
            newTask.textContent = taskText;

            taskList.appendChild(newTask);
            taskInput.value = ''; // Clear the input field after adding
        }
    </script>

</body>
</html>
